<h1 class="font-headline-md text-headline-md text-text-heading mb-1 text-center">Expiry Check</h1>
<p class="font-body-md text-body-md text-text-body text-center">Sign in to your intelligence suite</p>
</div>
<!-- Login Card -->
<div class="bg-background-pure p-stack-lg rounded-lg login-card">
<form action="#" class="space-y-stack-md" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-base">
<label class="block font-label-md text-label-md text-text-heading" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-border-subtle bg-surface-muted font-body-sm text-body-sm input-focus-ring transition-all" id="email" name="email" placeholder="name@store.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-text-heading" for="password">Password</label>
<a class="font-label-md text-label-md text-secondary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 rounded-lg border border-border-subtle bg-surface-muted font-body-sm text-body-sm input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-text-heading transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="pw-icon">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full py-3 px-4 bg-primary-container text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 btn-active transition-all flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-stack-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-subtle"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-background-pure px-2 text-text-body font-label-md">New store?</span>
</div>
</div>
<!-- Request Access -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-text-body">
                    Looking to manage your inventory better? 
                    <a class="text-primary font-bold hover:underline transition-all block mt-1" href="#">Request Access for your Store</a>
</p>
</div>
</div>
<!-- Footer Info -->
<footer class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-text-body opacity-60">
                Powered by <span class="font-bold">Expiry Check AI</span>
</p>
<div class="mt-4 flex justify-center gap-4">
<a class="font-label-sm text-label-sm text-text-body hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-text-body hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-text-body hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</main>
<script>
        function togglePassword() {
            const pwInput = document.getElementById('password');
            const pwIcon = document.getElementById('pw-icon');
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                pwIcon.textContent = 'visibility_off';
            } else {
                pwInput.type = 'password';
                pwIcon.textContent = 'visibility';
            }
        }

        // Simple interaction for the button to simulate loading state
        document.querySelector('form').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Authenticating...
            `;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 2000);
        });
    </script>
